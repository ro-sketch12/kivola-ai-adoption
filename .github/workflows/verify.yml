name: Verify project files

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run code tests
        run: python3 -m unittest discover -s tests
      - name: Run public content check
        run: python3 scripts/check_public_content.py
      - name: Check for oversized files
        run: |
          if find . -type f -size +1M | grep .; then
            echo "Oversized files should not be committed to this public repository."
            exit 1
          fi
