<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Kivola public-facing process flow</title>
  <desc id="desc">A simple process diagram showing discovery, analysis, assumptions, tool selection, pilot plan, and handoff.</desc>
  <rect width="1200" height="760" fill="#f7f9fc"/>
  <rect x="48" y="48" width="1104" height="664" rx="18" fill="#ffffff" stroke="#d8e0eb" stroke-width="2"/>
  <text x="80" y="112" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#172033">Kivola: vom Gespräch zum Pilotplan</text>
  <text x="80" y="154" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5c6678">Synthetische Demo. Keine echten Kundendaten, keine Rohberichte, keine privaten Prompts.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="80" y="220" width="180" height="110" rx="10" fill="#e9f2ff" stroke="#1f64bf"/>
    <text x="108" y="264" font-size="22" font-weight="800" fill="#172033">Discovery</text>
    <text x="108" y="296" font-size="16" fill="#5c6678">Prozess, Schmerz,</text>
    <text x="108" y="318" font-size="16" fill="#5c6678">Datenlage</text>
    <rect x="306" y="220" width="180" height="110" rx="10" fill="#edf7f1" stroke="#2f8f5b"/>
    <text x="334" y="264" font-size="22" font-weight="800" fill="#172033">Analyse</text>
    <text x="334" y="296" font-size="16" fill="#5c6678">Use Cases, Risiko,</text>
    <text x="334" y="318" font-size="16" fill="#5c6678">Priorität</text>
    <rect x="532" y="220" width="180" height="110" rx="10" fill="#fff6df" stroke="#c8911d"/>
    <text x="560" y="264" font-size="22" font-weight="800" fill="#172033">Annahmen</text>
    <text x="560" y="296" font-size="16" fill="#5c6678">Zeitlogik, keine</text>
    <text x="560" y="318" font-size="16" fill="#5c6678">Garantien</text>
    <rect x="758" y="220" width="180" height="110" rx="10" fill="#f0ebff" stroke="#6f57d8"/>
    <text x="786" y="264" font-size="22" font-weight="800" fill="#172033">Tool-Auswahl</text>
    <text x="786" y="296" font-size="16" fill="#5c6678">Stack nach Alltag,</text>
    <text x="786" y="318" font-size="16" fill="#5c6678">nicht Hype</text>
    <rect x="984" y="220" width="120" height="110" rx="10" fill="#eaf7f8" stroke="#328d9b"/>
    <text x="1011" y="264" font-size="22" font-weight="800" fill="#172033">Pilot</text>
    <text x="1011" y="296" font-size="16" fill="#5c6678">4 Wochen</text>
    <text x="1011" y="318" font-size="16" fill="#5c6678">Handoff</text>
    <path d="M260 275H306M486 275H532M712 275H758M938 275H984" stroke="#9aa8bb" stroke-width="3"/>
    <rect x="80" y="430" width="1024" height="160" rx="12" fill="#172033"/>
    <text x="112" y="478" font-size="24" font-weight="800" fill="#ffffff">Guardrails</text>
    <text x="112" y="520" font-size="18" fill="#dbe6f5">Fehlende Daten markieren  |  Annahmen trennen  |  menschliche Prüfung  |  kein harter ROI-Claim</text>
    <text x="112" y="562" font-size="18" fill="#dbe6f5">Die Demo nutzt Fake-Daten. Echte Kunden, Rohberichte und interne Prompts bleiben privat.</text>
  </g>
</svg>
